[features]
codex_hooks = true

[mcp_servers.blender]
command = "uvx"
args = ["blender-mcp@1.5.6"]

[mcp_servers.unreal]
command = "npx"
args = [
  "mcp-remote@0.1.38",
  "http://127.0.0.1:8088/mcp",
  "--transport",
  "http-only",
  "--allow-http",
]

[mcp_servers.meshy]
command = "npx"
args = ["meshy-mcp-server@1.2.3"]
env = { MESHY_API_KEY = "${MESHY_API_KEY}" }
